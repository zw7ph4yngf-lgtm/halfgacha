<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハーフガチャ</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎲 ハーフガチャ</h1>

<div class="money">
    所持金
    <span id="money">100</span> G
</div>

<div class="streaks">

<div>
🔥連勝
<span id="winStreak">0</span>
</div>

<div>
💀連敗
<span id="loseStreak">0</span>
</div>

</div>

<button id="gachaButton">
ガチャ
</button>

<div id="result">
ボタンを押してください
</div>

<div class="stats">

<p>総試行回数：
<span id="total">0</span></p>

<p>当たり：
<span id="wins">0</span></p>

<p>はずれ：
<span id="losses">0</span></p>

<p>勝率：
<span id="rate">0%</span></p>

<p>最大連勝：
<span id="maxWin">0</span></p>

<p>最大連敗：
<span id="maxLose">0</span></p>

</div>

<h2>履歴</h2>

<div id="history">

</div>

</div>

<nav>

<button class="tab active" data-tab="game">
ゲーム
</button>

<button class="tab" data-tab="achievement">
実績
</button>

</nav>

<div id="achievementPage" class="hidden">

<h2>🏆 実績</h2>

<div class="achievement" id="ach1">
❌
<b>始まり</b>

<p>当たりを1回引く</p>
</div>

<div class="achievement" id="ach2">
❌
<b>残念！</b>

<p>はずれを1回引く</p>
</div>

<div class="achievement" id="ach3">
❌
<b>逆の運</b>

<p>はずれを2回連続で引く</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
